name: Temporary E2E spec diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/tmp-e2e-diagnostics.yml'

permissions:
  contents: read

jobs:
  spec:
    name: ${{ matrix.spec }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        spec:
          - tests/e2e/uat-01-register.spec.ts
          - tests/e2e/uat-02-login-logout.spec.ts
          - tests/e2e/uat-03-auth-guard.spec.ts
          - tests/e2e/uat-04-chat-basic.spec.ts
          - tests/e2e/uat-05-chat-sse.spec.ts
          - tests/e2e/uat-06-material-upload.spec.ts
          - tests/e2e/uat-07-material-filter.spec.ts
          - tests/e2e/uat-08-navigation.spec.ts
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: material_chat
          POSTGRES_PASSWORD: material_chat
          POSTGRES_DB: material_chat_diag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U material_chat -d material_chat_diag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://material_chat:material_chat@localhost:5432/material_chat_diag?schema=public
      AUTH_SECRET: ci-only-placeholder-secret-at-least-32-characters
      NEXTAUTH_SECRET: ci-only-placeholder-secret-at-least-32-characters
      NEXTAUTH_URL: http://127.0.0.1:3000
      PLAYWRIGHT_USE_DEV_SERVER: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx playwright install --with-deps chromium
      - name: Run one UAT spec without retries
        run: npx playwright test "${{ matrix.spec }}" --workers=1 --retries=0 --timeout=30000 --reporter=line
