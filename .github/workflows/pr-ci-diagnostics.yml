name: PR CI Diagnostics

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Generate Prisma client and capture diagnostics
        id: prisma
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts/ci-diagnostics
          set +e
          npx prisma generate 2>&1 | tee artifacts/ci-diagnostics/prisma-generate.log
          status=${PIPESTATUS[0]}
          echo "$status" > artifacts/ci-diagnostics/prisma-generate.status
          exit "$status"

      - name: Run lint and capture diagnostics
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts/ci-diagnostics
          set +e
          npm run lint 2>&1 | tee artifacts/ci-diagnostics/lint.log
          status=${PIPESTATUS[0]}
          echo "$status" > artifacts/ci-diagnostics/lint.status
          exit "$status"

      - name: Run production build and capture diagnostics
        id: build
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts/ci-diagnostics
          set +e
          npm run build 2>&1 | tee artifacts/ci-diagnostics/build.log
          status=${PIPESTATUS[0]}
          echo "$status" > artifacts/ci-diagnostics/build.status
          exit "$status"
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: material-chat-ci-diagnostics-${{ github.run_id }}
          path: artifacts/ci-diagnostics/
          if-no-files-found: error
          retention-days: 14

      - name: Enforce Prisma, lint, and build gates
        if: >-
          steps.prisma.outcome != 'success'
          || steps.lint.outcome != 'success'
          || steps.build.outcome != 'success'
        run: exit 1
