name: Temporary update PR 2 branch

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/tmp-update-pr2-branch.yml'

permissions:
  contents: write

jobs:
  update-pr-branch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/detailed-uat-workflow
          fetch-depth: 0

      - name: Merge main, remove this helper, and synchronize the cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git fetch origin main agent/detailed-uat-workflow
          git checkout -B agent/detailed-uat-workflow origin/agent/detailed-uat-workflow
          git merge --no-ff origin/main -m 'Merge main into agent/detailed-uat-workflow'
          git push origin HEAD:agent/detailed-uat-workflow

          git checkout -B main origin/main
          git rm .github/workflows/tmp-update-pr2-branch.yml
          git commit -m 'ci: remove temporary PR branch updater'
          git push origin HEAD:main

          git fetch origin main agent/detailed-uat-workflow
          git checkout -B agent/detailed-uat-workflow origin/agent/detailed-uat-workflow
          git merge --no-ff origin/main -m 'Merge temporary updater cleanup from main'
          git push origin HEAD:agent/detailed-uat-workflow
