name: UAT Contract

on:
  pull_request:
    paths:
      - 'docs/uat/**'
      - 'src/**'
      - 'app/**'
      - 'tests/e2e/**'
      - '.github/workflows/uat-contract.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-uat-catalogue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Require exactly ten concrete UAT cases
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          text = Path('docs/uat/acceptance-cases.md').read_text(encoding='utf-8')
          cases = re.split(r'(?=^## UAT-\d{2}\b)', text, flags=re.M)[1:]
          assert len(cases) == 10, f'expected exactly 10 UAT cases, found {len(cases)}'
          expected = [f'UAT-{i:02d}' for i in range(1, 11)]
          found = [re.match(r'## (UAT-\d{2})', case).group(1) for case in cases]
          assert found == expected, f'UAT IDs must be sequential: {found}'
          for case_id, case in zip(found, cases):
              for field in ['**Person:**', '**Task:**', '**Preconditions:**', '**Steps:**', '**Acceptance criteria:**']:
                  assert field in case, f'{case_id} missing {field}'
              assert len(re.search(r'\*\*Person:\*\*\s*(.+)', case).group(1).split()) >= 3
              assert len(re.search(r'\*\*Task:\*\*\s*(.+)', case).group(1).split()) >= 5
          print('Validated 10 concrete person/task UAT cases.')
          PY

      - name: Require all ten numbered Playwright UAT specs
        shell: bash
        run: |
          set -euo pipefail
          count=$(find tests/e2e -maxdepth 1 -type f -name 'uat-[0-9][0-9]-*.spec.ts' | wc -l | tr -d ' ')
          test "$count" -eq 10
          for number in $(seq -w 1 10); do
            compgen -G "tests/e2e/uat-${number}-*.spec.ts" >/dev/null || {
              echo "Missing Playwright spec for UAT-${number}" >&2
              exit 1
            }
          done
          echo 'Validated automated coverage for UAT-01 through UAT-10.'

  web-quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/material_chat
          AUTH_SECRET: ci-only-placeholder-secret-at-least-32-characters
          NEXTAUTH_SECRET: ci-only-placeholder-secret-at-least-32-characters
          NEXTAUTH_URL: http://127.0.0.1:3000
          NEXT_TELEMETRY_DISABLED: '1'
