name: Playwright PR evidence

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: playwright-pr-evidence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  capture:
    name: Capture screenshots and video
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      PLAYWRIGHT_USE_DEV_SERVER: '1'
      BASE_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/material_chat_test
      AUTH_SECRET: ci-only-visual-evidence-secret-at-least-32-characters
      NEXTAUTH_SECRET: ci-only-visual-evidence-secret-at-least-32-characters
      NEXTAUTH_URL: http://127.0.0.1:3000

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: material_chat_test
        options: >-
          --health-cmd "pg_isready -U postgres -d material_chat_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Prepare PostgreSQL schema
        run: |
          set -euo pipefail
          npx prisma generate
          npx prisma db push --skip-generate

      - name: Preserve trusted PR body renderer
        id: renderer
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          renderer="$RUNNER_TEMP/update-pr-evidence.mjs"
          git show "${BASE_SHA}:scripts/update-pr-evidence.mjs" > "$renderer"
          echo "path=$renderer" >> "$GITHUB_OUTPUT"

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: npm run test:e2e

      - name: Upload Playwright evidence artifact
        id: upload
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-evidence-pr-${{ github.event.pull_request.number }}-run-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
            artifacts/
          if-no-files-found: warn
          retention-days: 30

      - name: Update PR body through GitHub API
        if: ${{ always() && !cancelled() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          TEST_OUTCOME: ${{ steps.playwright.outcome }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          EVIDENCE_TITLE: Playwright PR 视觉证据
          EVIDENCE_MARKER: playwright-evidence
          EVIDENCE_MEDIA_PATH: ''
          EVIDENCE_MEDIA_REF: ''
        run: node "${{ steps.renderer.outputs.path }}"

      - name: Fail if Playwright failed
        if: ${{ steps.playwright.outcome == 'failure' }}
        run: exit 1
