name: Temporary merge main into PR branch

on:
  pull_request:
    types: [synchronize]
    branches: [main]
    paths:
      - '.github/workflows/tmp-merge-main.yml'

permissions:
  contents: write

jobs:
  merge-main:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Merge current main without rewriting history
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            echo 'PR branch already contains current main.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git merge --no-ff origin/main -m 'Merge main into agent/detailed-uat-workflow'
          git push origin "HEAD:${{ github.head_ref }}"
