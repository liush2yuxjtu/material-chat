name: UAT GIF Artifact

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  record-uat-gif:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/material_chat_test
      NEXTAUTH_SECRET: test-secret-key-for-ci-uat
      NEXTAUTH_URL: http://127.0.0.1:3000

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: material_chat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Prepare database
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Start application
        run: |
          npm run dev -- --hostname 127.0.0.1 --port 3000 > /tmp/material-chat-uat-server.log 2>&1 &
          echo $! > /tmp/material-chat-uat-server.pid
          for attempt in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then exit 0; fi
            sleep 2
          done
          cat /tmp/material-chat-uat-server.log
          exit 1

      - name: Record browser UAT smoke flow
        run: |
          mkdir -p uat-media/videos uat-media/screenshots
          cat > record-material-chat.mjs <<'NODE'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({
            viewport: { width: 1440, height: 900 },
            recordVideo: { dir: 'uat-media/videos', size: { width: 1440, height: 900 } }
          });
          const page = await context.newPage();
          await page.goto('http://127.0.0.1:3000', { waitUntil: 'domcontentloaded', timeout: 120000 });
          await page.waitForTimeout(3000);
          await page.screenshot({ path: 'uat-media/screenshots/material-chat-home.png', fullPage: true });
          const links = page.getByRole('link');
          const count = await links.count();
          if (count > 0) {
            await links.first().hover().catch(() => undefined);
            await page.waitForTimeout(1500);
          }
          await page.mouse.wheel(0, 700);
          await page.waitForTimeout(2500);
          await page.mouse.wheel(0, -700);
          await page.waitForTimeout(2500);
          await context.close();
          await browser.close();
          fs.writeFileSync('uat-media/summary.txt', `Recorded ${new Date().toISOString()}\nURL: http://127.0.0.1:3000\n`);
          NODE
          node ./record-material-chat.mjs

      - name: Convert video to GIF
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          video="$(find uat-media/videos -type f -name '*.webm' | sort | head -n 1)"
          test -n "$video"
          ffmpeg -y -i "$video" -t 20 -vf "fps=8,scale=960:-1:flags=lanczos,split[s0][s1];[s0]palettegen=max_colors=128[p];[s1][p]paletteuse=dither=bayer:bayer_scale=4" uat-media/material-chat-uat.gif
          test -s uat-media/material-chat-uat.gif

      - name: Upload UAT video and GIF
        uses: actions/upload-artifact@v4
        with:
          name: material-chat-uat-video-and-gif
          path: uat-media/
          if-no-files-found: error
          retention-days: 30
