name: UAT Business Flow GIFs

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: uat-business-flow-gifs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  record-uat-business-flows:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: material_chat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout PR merge commit
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies and Chromium
        run: |
          set -euo pipefail
          npm ci
          npm install --no-save --package-lock=false @prisma/adapter-pg@7.8.0
          npx playwright install --with-deps chromium

      - name: Prepare UAT-compatible Prisma runtime
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/material_chat_test
        run: |
          set -euo pipefail
          mkdir -p artifacts/uat-diagnostics src/lib

          cat > src/lib/uat-prisma.ts <<'TS'
          import { PrismaPg } from '@prisma/adapter-pg';
          import { PrismaClient } from '@prisma/client';

          const connectionString = process.env.DATABASE_URL;
          if (!connectionString) {
            throw new Error('DATABASE_URL is required for UAT recording');
          }

          const globalForPrisma = globalThis as unknown as {
            uatPrisma?: PrismaClient;
          };
          const adapter = new PrismaPg({ connectionString });

          export const prisma =
            globalForPrisma.uatPrisma ?? new PrismaClient({ adapter });

          if (process.env.NODE_ENV !== 'production') {
            globalForPrisma.uatPrisma = prisma;
          }
          TS

          python - <<'PY'
          from pathlib import Path

          simple_files = [
              Path('src/auth.ts'),
              Path('src/app/api/v1/auth/register/route.ts'),
              Path('src/application/use-cases/ChatUseCase.ts'),
              Path('src/application/use-cases/ListMaterialsUseCase.ts'),
              Path('src/application/use-cases/UploadMaterialUseCase.ts'),
              Path('src/infrastructure/CompositionRoot.ts'),
          ]

          for path in simple_files:
              text = path.read_text(encoding='utf-8')
              old_import = "import { PrismaClient } from '@prisma/client';"
              if old_import in text:
                  text = text.replace(old_import, "import { prisma } from '@/lib/uat-prisma';", 1)
              text = text.replace('const prisma = new PrismaClient();\n', '')
              path.write_text(text, encoding='utf-8')

          memory_path = Path('src/adapters/postgres/PostgresMemoryAdapter.ts')
          memory = memory_path.read_text(encoding='utf-8')
          import_line = "import { Prisma, PrismaClient } from '@prisma/client';"
          if "@/lib/uat-prisma" not in memory:
              memory = memory.replace(
                  import_line,
                  import_line + "\nimport { prisma as uatPrisma } from '@/lib/uat-prisma';",
                  1,
              )
          memory = memory.replace(
              'this.prisma = prisma || new PrismaClient();',
              'this.prisma = prisma || uatPrisma;',
          )
          memory_path.write_text(memory, encoding='utf-8')
          PY

          if [ -f src/middleware.ts ]; then
            mv src/middleware.ts artifacts/uat-diagnostics/middleware.ts.disabled
          fi

          npx prisma generate 2>&1 | tee artifacts/uat-diagnostics/prisma-generate.log
          npx prisma db push 2>&1 | tee artifacts/uat-diagnostics/prisma-db-push.log

      - name: Start Material Chat development server
        env:
          CI: '1'
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/material_chat_test
          AUTH_SECRET: ci-only-uat-recording-secret-at-least-32-characters
          NEXTAUTH_SECRET: ci-only-uat-recording-secret-at-least-32-characters
          NEXTAUTH_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci-placeholder-client
          GOOGLE_CLIENT_SECRET: ci-placeholder-secret
          NEXT_TELEMETRY_DISABLED: '1'
        run: |
          set -euo pipefail
          rm -f /tmp/material-chat-uat-server.log
          npm run dev -- --webpack --hostname 127.0.0.1 --port 3000 > /tmp/material-chat-uat-server.log 2>&1 &
          server_pid=$!
          echo "$server_pid" > /tmp/material-chat-uat-server.pid
          for attempt in $(seq 1 60); do
            if ! kill -0 "$server_pid" 2>/dev/null; then
              echo "Material Chat exited before becoming ready."
              cat /tmp/material-chat-uat-server.log
              cp /tmp/material-chat-uat-server.log artifacts/uat-diagnostics/server.log || true
              exit 1
            fi
            status="$(curl --connect-timeout 1 --max-time 3 -sS -o /tmp/material-chat-home.html -w '%{http_code}' http://localhost:3000/ || true)"
            if [[ "$status" =~ ^(2|3) ]]; then
              cat /tmp/material-chat-uat-server.log
              exit 0
            fi
            sleep 2
          done
          echo "Material Chat did not become ready within 120 seconds."
          cat /tmp/material-chat-uat-server.log
          cp /tmp/material-chat-uat-server.log artifacts/uat-diagnostics/server.log || true
          cat /tmp/material-chat-home.html 2>/dev/null || true
          exit 1

      - name: Record visible UAT business flows
        env:
          BASE_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/material_chat_test
          AUTH_SECRET: ci-only-uat-recording-secret-at-least-32-characters
          NEXTAUTH_SECRET: ci-only-uat-recording-secret-at-least-32-characters
          NEXTAUTH_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci-placeholder-client
          GOOGLE_CLIENT_SECRET: ci-placeholder-secret
          UAT_EMAIL: uat-recording-${{ github.run_id }}@example.com
          UAT_PASSWORD: uat-test-123456
          UAT_OUTPUT_DIR: /tmp/material-chat-uat-media
        run: |
          set -uo pipefail
          rm -rf uat-media /tmp/material-chat-uat-media

          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/record-material-chat-uat.mjs')
          text = path.read_text(encoding='utf-8')
          needle = "  const response = await credentialsResponse;\n  if (!response.ok()) {"
          replacement = "  const response = await credentialsResponse;\n  await page.waitForTimeout(3000);\n  if (!response.ok()) {"
          if needle not in text:
              raise SystemExit('Second-login stabilization marker not found')
          path.write_text(text.replace(needle, replacement, 1), encoding='utf-8')
          PY

          set +e
          node scripts/record-material-chat-uat.mjs
          status=$?
          set -e
          if [ -d /tmp/material-chat-uat-media ]; then
            cp -R /tmp/material-chat-uat-media uat-media
          fi
          cp /tmp/material-chat-uat-server.log artifacts/uat-diagnostics/server.log || true
          exit "$status"

      - name: Convert UAT videos to GIF
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          mkdir -p uat-media/gifs

          first_video='uat-media/videos/UAT-01-04-register-chat.webm'
          second_video='uat-media/videos/UAT-02-06-07-login-upload-filter.webm'
          first_gif='uat-media/gifs/UAT-01-04-register-chat.gif'
          second_gif='uat-media/gifs/UAT-02-06-07-login-upload-filter.gif'

          test -s "$first_video"
          test -s "$second_video"

          ffmpeg -y -threads 1 -i "$first_video" -t 45 \
            -vf "fps=7,scale=800:-2:flags=lanczos,split[s0][s1];[s0]palettegen=max_colors=96[p];[s1][p]paletteuse=dither=bayer:bayer_scale=5" \
            "$first_gif"

          ffmpeg -y -threads 1 -i "$second_video" -t 45 \
            -vf "fps=7,scale=800:-2:flags=lanczos,split[s0][s1];[s0]palettegen=max_colors=96[p];[s1][p]paletteuse=dither=bayer:bayer_scale=5" \
            "$second_gif"

          test -s "$first_gif"
          test -s "$second_gif"

      - name: Verify UAT evidence
        run: |
          set -euo pipefail
          test "$(find uat-media/videos -type f -name '*.webm' -size +0c | wc -l)" -eq 2
          test "$(find uat-media/gifs -type f -name '*.gif' -size +0c | wc -l)" -eq 2
          test "$(find uat-media/screenshots -type f -name '*.png' -size +0c | wc -l)" -eq 2
          test -s uat-media/summary.json
          find uat-media -type f -print -exec stat --format='  %s bytes' {} \;

      - name: Upload UAT videos and GIFs
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: material-chat-real-uat-videos-and-gifs-pr-${{ github.event.pull_request.number || 'manual' }}-run-${{ github.run_id }}
          path: uat-media/
          if-no-files-found: error
          retention-days: 30

      - name: Upload runtime diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: material-chat-uat-runtime-diagnostics-${{ github.run_id }}
          path: |
            artifacts/uat-diagnostics/
            uat-media/
          if-no-files-found: warn
          retention-days: 7

      - name: Add artifact links to job summary
        run: |
          {
            echo '## Material Chat 真实 UAT 业务录屏'
            echo
            echo '- UAT-01 / UAT-04：注册与 AI 流式对话'
            echo '- UAT-02 / UAT-06 / UAT-07：重新登录、素材上传与标签筛选'
            echo '- [下载 GIF、WebM 和截图 artifact](${{ steps.upload.outputs.artifact-url }})'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update PR with UAT artifact link
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: material-chat-real-uat-recordings
          message: |
            ## Material Chat 真实 UAT 业务录屏

            本次 Actions 已录制以下可观察业务流程：

            1. **UAT-01 / UAT-04**：新用户注册 → 自动登录 → 输入问题 → 接收 Mock LLM SSE 流式回答。
            2. **UAT-02 / UAT-06 / UAT-07**：使用新账号重新登录 → 上传课程资料 → 设置文档类型与标签 → 按类型和标签筛选。

            录屏包含步骤标题、控件高亮和通过标记。

            - [下载 GIF、原始 WebM 和最终截图](${{ steps.upload.outputs.artifact-url }})
            - [打开本次 Actions 运行](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            媒体仅保存在 GitHub Actions artifact 中，不提交到仓库。