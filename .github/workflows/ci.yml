name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint 2>&1 | tail -n 120

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit 2>&1 | tail -n 120

  prisma:
    name: prisma
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: material_chat
          POSTGRES_PASSWORD: material_chat
          POSTGRES_DB: material_chat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U material_chat -d material_chat_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://material_chat:material_chat@localhost:5432/material_chat_test?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check Prisma formatting
        run: npx prisma format --check 2>&1 | tail -n 120
      - run: npx prisma validate
      - run: npx prisma generate
      - run: npx prisma migrate deploy

  build:
    name: build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://material_chat:material_chat@localhost:5432/material_chat_build?schema=public
      AUTH_SECRET: ci-only-placeholder-secret-at-least-32-characters
      NEXTAUTH_SECRET: ci-only-placeholder-secret-at-least-32-characters
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Build
        run: npm run build 2>&1 | tail -n 120

  playwright:
    name: playwright
    runs-on: ubuntu-latest
    needs: [lint, typecheck, prisma, build]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: material_chat
          POSTGRES_PASSWORD: material_chat
          POSTGRES_DB: material_chat_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U material_chat -d material_chat_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://material_chat:material_chat@localhost:5432/material_chat_e2e?schema=public
      AUTH_SECRET: ci-only-placeholder-secret-at-least-32-characters
      NEXTAUTH_SECRET: ci-only-placeholder-secret-at-least-32-characters
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E
        run: npm run test:e2e 2>&1 | tail -n 160
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, prisma, build]
    env:
      DOCKER_BUILDKIT: 1
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build --progress=plain -t material-chat:${{ github.sha }} . 2>&1 | tail -n 160
