name: Temporary Prisma lock maintenance

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/tmp-prisma-lock.yml'

permissions:
  contents: write

jobs:
  update-lockfile:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Generate deterministic Prisma adapter lock entries
        run: npm install @prisma/adapter-pg@7.8.0 --save --package-lock-only --ignore-scripts
      - name: Commit generated manifests to the PR branch
        shell: bash
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            echo 'No dependency manifest changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json
          git commit -m 'build: add Prisma PostgreSQL driver adapter'
          git push origin "HEAD:${{ github.head_ref }}"
