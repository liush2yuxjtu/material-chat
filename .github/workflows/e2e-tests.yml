name: UAT — E2E 测试（PR 内联快照 + 视频 + 报告）

on:
  workflow_dispatch:
    inputs:
      test_grep:
        description: '只跑匹配的测试（如 "UAT-01" 跑注册）'
        required: false
        default: ''

  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'

  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: uat-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read
  deployments: write

jobs:
  uat:
    name: Playwright UAT
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/material_chat_test
      AUTH_SECRET: test-secret-key-for-ci-uat-at-least-32-characters
      NEXTAUTH_SECRET: test-secret-key-for-ci-uat-at-least-32-characters
      NEXTAUTH_URL: http://127.0.0.1:3000

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: material_chat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium

      - name: 生成 Prisma Client
        run: npx prisma generate

      - name: 创建 UAT 数据库结构
        run: npx prisma db push --skip-generate

      - name: 构建应用
        run: npm run build

      - name: 运行 UAT 测试
        id: playwright
        run: |
          GREP="${{ github.event.inputs.test_grep }}"
          if [ -n "$GREP" ]; then
            echo "→ 只运行: $GREP"
            npx playwright test --grep "$GREP"
          else
            npx playwright test
          fi
        continue-on-error: true

      - name: 整理截图到报告目录
        if: always()
        run: |
          mkdir -p playwright-report/screenshots playwright-report/videos
          find test-results -name "*.png" -exec cp {} playwright-report/screenshots/ \; 2>/dev/null || true
          find test-results -name "*.webm" -exec cp {} playwright-report/videos/ \; 2>/dev/null || true
          echo "Screenshots: $(find playwright-report/screenshots -type f 2>/dev/null | wc -l)"
          echo "Videos: $(find playwright-report/videos -type f 2>/dev/null | wc -l)"

      - name: 生成测试摘要
        id: summary
        if: always()
        run: python3 scripts/generate-uat-summary.py
        env:
          PAGES_BASE: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          GITHUB_RUN_ID: "${{ github.run_id }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"
          GITHUB_SERVER_URL: "${{ github.server_url }}"

      - name: 部署报告到 GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: uat-report
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: '📊 UAT report for ${{ github.run_id }}'

      - name: PR 内联评论
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: uat-results
          path: uat-comment.md

      - name: 上传 HTML 报告 (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: test-results/**/*.png
          if-no-files-found: warn
          retention-days: 30

      - name: 上传视频
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: test-results/**/*.webm
          if-no-files-found: warn
          retention-days: 14

      - name: 上传 Trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace.zip
          if-no-files-found: warn
          retention-days: 14

      - name: 测试失败时令工作流失败
        if: steps.playwright.outcome == 'failure'
        run: exit 1
